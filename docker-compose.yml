services:
  backend:
    image: starmap-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - starmap_backend_data:/data
      - starmap_hf_cache:/models/huggingface
    environment:
      PYTHONUNBUFFERED: "1"
      STARMAP_RESOURCE_DIR: /data
      STARMAP_SEED_DIR: /app/interpretability_backend/resources/seed
      STARMAP_DIRECTIONS_DIR: /app/interpretability_backend/resources/directions
      HF_HOME: /models/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CHROMA_OPENAI_API_KEY: ${CHROMA_OPENAI_API_KEY:-}
      CHROMA_COHERE_API_KEY: ${CHROMA_COHERE_API_KEY:-}
      CHROMA_HUGGINGFACE_API_KEY: ${CHROMA_HUGGINGFACE_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  frontend:
    image: starmap-frontend:latest
    build:
      context: ./embedding_visualization
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL:-http://localhost:8000/graphql}
        NEXT_PUBLIC_GRAPHQL_WS_URL: ${NEXT_PUBLIC_GRAPHQL_WS_URL:-ws://localhost:8000/graphql}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL:-http://localhost:8000/graphql}
      NEXT_PUBLIC_GRAPHQL_WS_URL: ${NEXT_PUBLIC_GRAPHQL_WS_URL:-ws://localhost:8000/graphql}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  sae-warmup:
    image: starmap-backend:latest
    profiles:
      - sae
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - starmap_backend_data:/data
      - starmap_hf_cache:/models/huggingface
    environment:
      PYTHONUNBUFFERED: "1"
      STARMAP_RESOURCE_DIR: /data
      STARMAP_SEED_DIR: /app/interpretability_backend/resources/seed
      STARMAP_DIRECTIONS_DIR: /app/interpretability_backend/resources/directions
      HF_HOME: /models/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      STARMAP_BACKEND_HEALTH_URL: http://backend:8000/health
      STARMAP_GRAPHQL_URL: http://backend:8000/graphql
      STARMAP_MODEL_CHECKPOINT: google/gemma-3-4b-it
      STARMAP_SAE_LAYER: "9"
      STARMAP_SAE_WIDTH: 16k
      STARMAP_SAE_HOOK_TYPE: resid_post
      STARMAP_SAE_MODEL_SIZE: 4b
      STARMAP_SAE_VARIANT: it
    command:
      [
        "uv",
        "run",
        "--frozen",
        "python",
        "-m",
        "interpretability_backend.scripts.docker_warmup_sae",
      ]
    restart: "no"

volumes:
  starmap_backend_data:
  starmap_hf_cache:

networks:
  default:
    name: embedding-viz
